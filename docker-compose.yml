services:
  postgres:
    image: postgres:16-alpine
    container_name: pandora-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: PandoraAnalyticsAPI.API/Dockerfile
    container_name: pandora-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: https://+:5001
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/tls.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${TLS_CERT_PASSWORD}
      ConnectionStrings__DefaultConnection: Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "5001:5001"
    volumes:
      - ${TLS_CERT_PATH}:/https/tls.pfx:ro
    restart: unless-stopped

volumes:
  postgres-data:
